{% extends "base.html" %}

{% block content %}
<div class="result">
    <h2>New Service Template</h2>

    <form action="/services" method="post">
        <div class="form-group">
            <label for="name">Service Name</label>
            <input type="text" id="name" name="name" placeholder="Website Redesign" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4"
                placeholder="Full description of the service including scope, deliverables, and what's included." required></textarea>
        </div>
        <div class="form-group">
            <label for="default_constraints">Default Constraints</label>
            <textarea id="default_constraints" name="default_constraints" rows="2"
                placeholder="Standard constraints for this service type"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="estimated_hours">Estimated Hours</label>
                <input type="number" id="estimated_hours" name="estimated_hours" step="0.5" min="0" placeholder="160">
            </div>
            <div class="form-group">
                <label for="hourly_rate">Hourly Rate</label>
                <input type="number" id="hourly_rate" name="hourly_rate" step="0.01" min="0" placeholder="150">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="normal_delivery_days">Normal Delivery (days)</label>
                <input type="number" id="normal_delivery_days" name="normal_delivery_days" min="1" placeholder="60">
            </div>
            <div class="form-group">
                <label for="fast_delivery_days">Fast Delivery (days)</label>
                <input type="number" id="fast_delivery_days" name="fast_delivery_days" min="1" placeholder="30">
            </div>
        </div>
        <button type="submit">Create Service Template</button>
    </form>
</div>
{% endblock %}
