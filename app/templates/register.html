<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing - Register</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
    (function() {
        var t = localStorage.getItem('theme');
        if (t === 'light') document.documentElement.dataset.theme = 'light';
    })();
    </script>
</head>
<body>
    <main>
        <div class="auth-container">
            <h1 class="auth-logo">PRECIO</h1>
            <p class="auth-subtitle">B2B Pricing Intelligence</p>

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form action="/register" method="post" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min 8 characters" minlength="8" required>
                </div>
                <button type="submit">Create Account</button>
                <p class="auth-credits">You'll get {{ free_credits }} free pricing runs to start.</p>
            </form>

            <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </main>
</body>
</html>
